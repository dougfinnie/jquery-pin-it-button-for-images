# Build installable WordPress plugin ZIP on every push to main.
# Requires: Forgejo Actions + a runner whose label matches runs-on (default: docker).
# Artifact: jquery-pin-it-button-for-images-<version>.zip (version from package.json)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Minimal runner images often omit `zip`; npm script shells out to it.
      - name: Install zip
        run: |
          if command -v zip >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y --no-install-recommends zip
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache zip
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y zip
          elif command -v yum >/dev/null 2>&1; then
            yum install -y zip
          else
            echo "No supported package manager found; install zip in the runner image." >&2
            exit 1
          fi

      - name: Build ZIP
        run: npm run zip

      # v4+ uses the new artifact API; Forgejo / GHES-style backends only support v3.
      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v3
        with:
          name: jquery-pin-it-button-for-images-zip
          path: jquery-pin-it-button-for-images-*.zip
          if-no-files-found: error
